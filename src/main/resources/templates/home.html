<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            background-color: #FECDD7;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 5px;
        }

        a {
            color: #e91e63;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background-color: #f06292;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .logout {
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MY Website 20230140182</h1>
    <p>Selamat datang di aplikasi!</p>

    <a href="/form">+ Input Data Mahasiswa</a>

    <h3>Data Mahasiswa</h3>

    <table border="1">
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>

        <!-- kondisi kosong -->
        <tr th:if="${users == null || users.isEmpty()}">
            <td colspan="4">Belum ada data</td>
        </tr>

        <!-- kondisi ada data -->
        <tr th:each="user, iterStat : ${users}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${user.nama}"></td>
            <td th:text="${user.nim}"></td>
            <td th:text="${user.jenisKelamin}"></td>
        </tr>
    </table>

    <a href="/" class="logout">Logout</a>
</div>

</body>
</html>
